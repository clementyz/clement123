<script>
// ============ JSONBin 配置 ============
const BIN_ID = "6a5cc243da38895dfe7238ab";
const MASTER_KEY = "$2a$10$.XuXrDEqcDcIESsNsUBF1.GqMwayzG/zpswI00LVmzMghv/OZ1DBe";
const API_HOST = "https://api.jsonbin.io/v3";
// ======================================

const authorData = {
    1: `
        <h3>本篇论文作者介绍</h3>
        <div class="author-item">
            <img class="author-avatar" src="xietian.jpg" alt="谢添头像">
            <div class="author-text">
                <div class="author-name">谢添 | 23级硕士研究生</div>
                <div>研究方向：复合材料多尺度仿真、低速冲击损伤；参与2项横向课题，发表SCI论文2篇。</div>
            </div>
        </div>
    `,
    2: `
        <h3>本篇论文作者介绍</h3>
        <div class="author-item">
            <img class="author-avatar" src="xuzhangjie.jpg" alt="许张杰头像">
            <div class="author-text">
                <div class="author-name">许张杰 | 本科科创学生</div>
                <div>研究方向：树脂灌注成型、孔隙缺陷控制；主导本课题实验。</div>
            </div>
        </div>
    `
};
function openAuthorModal(id) {
    document.getElementById('modalContent').innerHTML = authorData[id];
    document.getElementById('authorModal').style.display = 'flex';
}
function closeAuthorModal() {
    document.getElementById('authorModal').style.display = 'none';
}
document.getElementById('authorModal').addEventListener('click', function(e){
    if(e.target === this){
        closeAuthorModal();
    }
})

// 全局缓存数据 + 默认兜底结构
let cloudData = {
    paperLike: {"1":0,"2":0},
    paperComments: {"1":[],"2":[]},
    stuComments: {"1":[],"2":[],"3":[],"4":[],"5":[],"6":[]}
};
// 本地存储：记录当前设备已点赞的论文，防止刷赞
const LIKE_STORAGE_KEY = "lab_has_liked_paper";

// 获取本机已点赞列表
function getLikedRecord() {
    const str = localStorage.getItem(LIKE_STORAGE_KEY);
    return str ? JSON.parse(str) : [];
}
// 保存点赞记录
function saveLikedRecord(arr) {
    localStorage.setItem(LIKE_STORAGE_KEY, JSON.stringify(arr));
}

// 读取云端数据
async function loadCloudData(){
    try{
        const res = await fetch(`${API_HOST}/b/${BIN_ID}/latest`,{
            headers: { "X-Master-Key": MASTER_KEY }
        });
        if(!res.ok) throw new Error("接口返回异常，请核对BIN_ID和密钥");
        const json = await res.json();
        const record = json.record || {};
        // 兜底补全缺失字段，防止渲染报错
        cloudData.paperLike = record.paperLike || {"1":0,"2":0};
        cloudData.paperComments = record.paperComments || {"1":[],"2":[]};
        cloudData.stuComments = record.stuComments || {"1":[],"2":[],"3":[],"4":[],"5":[],"6":[]};
        renderAllPaper();
    }catch(err){
        alert("数据加载失败：" + err.message + "\n1.检查网络；2.核对BIN_ID/MASTER_KEY；3.确认JSONBin仓库数据格式正确");
        console.error("读取云端数据失败",err);
    }
}

// 同步数据到云端
async function saveCloudData(){
    try{
        await fetch(`${API_HOST}/b/${BIN_ID}`,{
            method:"PUT",
            headers: {
                "X-Master-Key": MASTER_KEY,
                "Content-Type":"application/json"
            },
            body: JSON.stringify(cloudData)
        });
        return true;
    }catch(err){
        alert("提交失败，请检查网络后重试");
        console.error("保存云端失败", err);
        return false;
    }
}

// 点赞函数（增加单设备仅一次限制）
async function addLike(pid){
    const likedList = getLikedRecord();
    if(likedList.includes(String(pid))){
        alert("你已经为这篇论文点过赞啦，无法重复点赞");
        return;
    }
    // 禁用按钮防止重复点击
    const btn = document.querySelector(`.paper-card[data-paper-id="${pid}"] .like-btn`);
    btn.disabled = true;
    btn.innerText = "提交中...";

    cloudData.paperLike[pid] += 1;
    const saveOk = await saveCloudData();
    if(saveOk){
        // 记录本机已点赞
        likedList.push(String(pid));
        saveLikedRecord(likedList);
        document.querySelector(`.paper-card[data-paper-id="${pid}"] .like-num`).innerText = cloudData.paperLike[pid];
    }
    // 恢复按钮
    btn.disabled = false;
    btn.innerHTML = `👍 点赞 <span class="like-num">${cloudData.paperLike[pid]}</span>`;
}

// 提交论文评论
async function submitPaperComment(pid){
    const card = document.querySelector(`.paper-card[data-paper-id="${pid}"]`);
    const nick = card.querySelector(".nickname").value.trim();
    const text = card.querySelector(".comment-text").value.trim();
    if(!nick || !text){
        alert("请填写昵称和评论内容！");
        return;
    }
    const submitBtn = card.querySelector(".submit-comment");
    submitBtn.disabled = true;
    submitBtn.innerText = "发布中...";

    cloudData.paperComments[pid].push({
        nick,
        text,
        time: new Date().toLocaleString()
    });
    const ok = await saveCloudData();
    if(ok){
        renderPaperComment(pid);
        card.querySelector(".nickname").value = "";
        card.querySelector(".comment-text").value = "";
    }
    submitBtn.disabled = false;
    submitBtn.innerText = "发布评论";
}

// 渲染单篇论文评论
function renderPaperComment(pid){
    const wrap = document.getElementById(`paper-comment-${pid}`);
    let html = "";
    cloudData.paperComments[pid].forEach(item=>{
        html += `<div class="comment-item">
            <div class="comment-user">${item.nick} <span style="font-weight:normal;color:#888;font-size:12px;">${item.time}</span></div>
            <div>${item.text}</div>
        </div>`;
    })
    wrap.innerHTML = html;
}

// 渲染所有论文点赞+评论
function renderAllPaper(){
    for(let pid in cloudData.paperLike){
        const numDom = document.querySelector(`.paper-card[data-paper-id="${pid}"] .like-num`);
        if(numDom) numDom.innerText = cloudData.paperLike[pid];
        renderPaperComment(pid);
    }
}

// 页面加载自动拉取云端数据
window.onload = function(){
    loadCloudData();
}
</script>
